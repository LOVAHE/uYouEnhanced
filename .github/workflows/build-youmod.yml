name: Build YouMod IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "Direct URL to the decrypted YouTube IPA"
        required: true
        type: string
      bundle_id:
        description: "Bundle identifier"
        default: "com.google.ios.youtube"
        required: true
        type: string
      app_name:
        description: "Application name"
        default: "YouTube"
        required: true
        type: string

concurrency:
  group: build-youmod-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  THEOS: ${{ github.workspace }}/theos
  THEOS_COMMIT: 16362d3aa83a0acd56df4493d575d34306d42478
  LOGOS_COMMIT: a62370066a97e36d59b200a9fa10c5091f5e8972
  SDK_REPOSITORY_COMMIT: f573274868bf0f954ed01a1ab029756218a91119
  YOUTUBE_HEADER_COMMIT: 7a87be7855e2ea8f820f634518388eec9b667ec4
  PS_HEADER_COMMIT: 1bb7d9c7d1bc40a57f83e1e58aa53bcf4acdcbfa
  YOUMOD_COMMIT: a130dbae9d7969ef44754c22d661a55a9e1d3086
  YTUHD_SOURCE_COMMIT: 9a561cca86ad7a17b39a8df2ae9d634b79d9c793
  LIBVPX_COMMIT: 908e88c1aa6a12a86feb5d36a919c219c42f1e2c
  PYZULE_COMMIT: 740d3716dcd98c20c000f12cdb88f1f0b2a533a4

jobs:
  build:
    name: YouMod with minimal VP9 compatibility
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out VP9 compatibility source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install build dependencies
        run: brew install ldid dpkg make

      - name: Configure build tools
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"
          mkdir -p "$RUNNER_TEMP/bin"
          curl --fail --location --silent --show-error \
            "https://github.com/inoahdev/tbd/releases/download/2.2/tbd-mac" \
            --output "$RUNNER_TEMP/bin/tbd"
          chmod +x "$RUNNER_TEMP/bin/tbd"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          pipx install \
            "https://github.com/asdfzxcvbn/pyzule-rw/archive/${PYZULE_COMMIT}.zip"

      - name: Download and prepare YouTube
        id: youtube
        env:
          IPA_URL: >-
            ${{ inputs.ipa_url ||
            'https://archive.org/download/com.google.ios.youtube-21.21.03-Decrypted/com.google.ios.youtube-21.21.03-Decrypted.ipa' }}
        run: |
          echo "::add-mask::$IPA_URL"
          curl --fail --location --silent --show-error \
            "$IPA_URL" --output "$RUNNER_TEMP/youtube.ipa"
          unzip -tq "$RUNNER_TEMP/youtube.ipa"
          mkdir "$RUNNER_TEMP/clean-youtube"
          unzip -q "$RUNNER_TEMP/youtube.ipa" \
            -d "$RUNNER_TEMP/clean-youtube" \
            -x "Payload/YouTube.app/PlugIns/*" \
               "Payload/YouTube.app/Extensions/*" \
               "Payload/YouTube.app/Watch/*" \
               "*.appex/*"
          test -f "$RUNNER_TEMP/clean-youtube/Payload/YouTube.app/Info.plist"
          if find "$RUNNER_TEMP/clean-youtube/Payload/YouTube.app" \
              -type d -name "*.appex" -print -quit | grep -q .; then
            echo "An app extension remained after clean extraction." >&2
            exit 1
          fi
          youtube_version=$(
            /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" \
              "$RUNNER_TEMP/clean-youtube/Payload/YouTube.app/Info.plist"
          )
          echo "version=$youtube_version" >> "$GITHUB_OUTPUT"

          python3 - \
            "$RUNNER_TEMP/clean-youtube/Payload/YouTube.app/YouTube" <<'PY'
          import pathlib
          import sys

          binary_path = pathlib.Path(sys.argv[1])
          binary = bytearray(binary_path.read_bytes())
          pattern = bytes.fromhex(
              "28 66 8c 52 c8 2e ac 72 1f 00 08 6b 61 00 00 54 "
              "28 00 80 52"
          )
          matches = []
          offset = 0
          while True:
              offset = binary.find(pattern, offset)
              if offset < 0:
                  break
              matches.append(offset)
              offset += 1
          if len(matches) != 1:
              raise SystemExit(
                  f"Expected one SupportsCodec signature, found {len(matches)}"
              )
          match = matches[0]
          if match < 4 or binary[match - 4:match] != bytes.fromhex(
              "c0 03 5f d6"
          ):
              raise SystemExit(
                  "SupportsCodec signature is not at a verified function boundary"
              )
          replacement = bytes.fromhex("20 00 80 52 c0 03 5f d6")
          binary[match:match + len(replacement)] = replacement
          binary_path.write_bytes(binary)
          if binary[match:match + len(replacement)] != replacement:
              raise SystemExit("Failed to patch SupportsCodec")
          print(
              f"Patched SupportsCodec to return true at file offset 0x{match:x}"
          )
          PY

          (
            cd "$RUNNER_TEMP/clean-youtube"
            ditto -c -k --sequesterRsrc --keepParent Payload \
              "$RUNNER_TEMP/youtube-no-extensions.ipa"
          )

      - name: Set up pinned Theos and headers
        run: |
          git clone --quiet --filter=blob:none \
            https://github.com/theos/theos.git "$THEOS"
          git -C "$THEOS" checkout --quiet --detach "$THEOS_COMMIT"
          git -C "$THEOS" submodule update --init --recursive
          git -C "$THEOS/vendor/logos" fetch --quiet --depth=1 \
            origin "$LOGOS_COMMIT"
          git -C "$THEOS/vendor/logos" checkout --quiet --detach "$LOGOS_COMMIT"

          git clone --quiet --no-checkout --filter=tree:0 \
            https://github.com/Tonwalter888/iOS-SDKs.git "$RUNNER_TEMP/sdks"
          git -C "$RUNNER_TEMP/sdks" sparse-checkout init --no-cone
          git -C "$RUNNER_TEMP/sdks" sparse-checkout set iPhoneOS18.6.sdk
          git -C "$RUNNER_TEMP/sdks" checkout --quiet \
            "$SDK_REPOSITORY_COMMIT"
          mv "$RUNNER_TEMP/sdks/iPhoneOS18.6.sdk" "$THEOS/sdks/"

          git clone --quiet --filter=blob:none \
            https://github.com/PoomSmart/YouTubeHeader.git \
            "$THEOS/include/YouTubeHeader"
          git -C "$THEOS/include/YouTubeHeader" checkout --quiet --detach \
            "$YOUTUBE_HEADER_COMMIT"
          git clone --quiet --filter=blob:none \
            https://github.com/PoomSmart/PSHeader.git \
            "$THEOS/include/PSHeader"
          git -C "$THEOS/include/PSHeader" checkout --quiet --detach \
            "$PS_HEADER_COMMIT"

      - name: Check out pinned tweak sources
        run: |
          git clone --quiet --filter=blob:none \
            https://github.com/Tonwalter888/YouMod.git YouMod
          git -C YouMod checkout --quiet --detach "$YOUMOD_COMMIT"

          mkdir -p Tweaks/VP9Compat/vendor/ytuhd
          source_url="https://raw.githubusercontent.com/PoomSmart/YTUHD/${YTUHD_SOURCE_COMMIT}"
          curl --fail --location --silent --show-error \
            "$source_url/HAMVPXVideoDecoder.m" \
            --output Tweaks/VP9Compat/vendor/ytuhd/HAMVPXVideoDecoder.m
          curl --fail --location --silent --show-error \
            "$source_url/VideoDecoderHelper.x" \
            --output Tweaks/VP9Compat/vendor/ytuhd/VideoDecoderHelper.x
          (
            cd Tweaks/VP9Compat/vendor/ytuhd
            echo \
              "0a9c41131b6a60881912b87bda50f76edad5a941bfe50d72e8a4fc674db95081  HAMVPXVideoDecoder.m" \
              | shasum -a 256 -c -
            echo \
              "fba6a80f3e8630d446ff465a901952d58617d0e7760037128ba8c4c58d2a4173  VideoDecoderHelper.x" \
              | shasum -a 256 -c -
          )

          git clone --quiet --filter=blob:none \
            https://github.com/webmproject/libvpx.git \
            Tweaks/VP9Compat/vendor/libvpx
          git -C Tweaks/VP9Compat/vendor/libvpx \
            checkout --quiet --detach "$LIBVPX_COMMIT"

      - name: Build YouMod
        id: youmod
        run: |
          youmod_version=$(awk '/^Version:/ { print $2 }' YouMod/control)
          echo "version=$youmod_version" >> "$GITHUB_OUTPUT"
          make -C YouMod clean package \
            DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          cp YouMod/packages/*.deb "$RUNNER_TEMP/youmod.deb"

      - name: Build minimal VP9 compatibility layer
        id: vp9compat
        run: |
          vp9compat_version=$(
            awk '/^Version:/ { print $2 }' Tweaks/VP9Compat/control
          )
          echo "version=$vp9compat_version" >> "$GITHUB_OUTPUT"
          make -C Tweaks/VP9Compat libvpx
          make -C Tweaks/VP9Compat clean package \
            DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          cp Tweaks/VP9Compat/packages/*.deb "$RUNNER_TEMP/vp9compat.deb"

      - name: Inject YouMod and VP9 compatibility layer
        id: inject
        env:
          APP_NAME: ${{ inputs.app_name || 'YouTube' }}
          BUNDLE_ID: ${{ inputs.bundle_id || 'com.google.ios.youtube' }}
          YOUTUBE_VERSION: ${{ steps.youtube.outputs.version }}
          YOUMOD_VERSION: ${{ steps.youmod.outputs.version }}
          VP9COMPAT_VERSION: ${{ steps.vp9compat.outputs.version }}
        run: |
          package="YouTube_${YOUTUBE_VERSION}_YouMod-${YOUMOD_VERSION}_VP9Compat-${VP9COMPAT_VERSION}.ipa"
          cyan \
            -i "$RUNNER_TEMP/youtube-no-extensions.ipa" \
            -o "$package" \
            -uwef \
              "$RUNNER_TEMP/youmod.deb" \
              "$RUNNER_TEMP/vp9compat.deb" \
            -n "$APP_NAME" \
            -b "$BUNDLE_ID"
          echo "package=$package" >> "$GITHUB_OUTPUT"

      - name: Validate final IPA
        env:
          PACKAGE: ${{ steps.inject.outputs.package }}
          EXPECTED_APP_NAME: ${{ inputs.app_name || 'YouTube' }}
          EXPECTED_BUNDLE_ID: >-
            ${{ inputs.bundle_id || 'com.google.ios.youtube' }}
        run: |
          unzip -tq "$PACKAGE"
          entries=$(unzip -Z1 "$PACKAGE")

          for required in \
            "Payload/YouTube.app/Frameworks/YouMod.dylib" \
            "Payload/YouTube.app/Frameworks/VP9Compat.dylib" \
            "Payload/YouTube.app/YouMod.bundle/Info.plist"; do
            if ! grep -Fxq "$required" <<< "$entries"; then
              echo "Missing required package entry: $required" >&2
              exit 1
            fi
          done

          if grep -Eq '\.appex/' <<< "$entries"; then
            echo "Unsupported app extensions remained in the IPA." >&2
            exit 1
          fi

          if grep -Fq "Payload/YouTube.app/PlugIns/" <<< "$entries"; then
            echo "Unsupported PlugIns directory remained in the IPA." >&2
            exit 1
          fi

          for forbidden in \
            YTUHD.dylib \
            uYou.dylib \
            uYouCompat.dylib \
            uYouEnhanced.dylib; do
            if grep -Fq "/$forbidden" <<< "$entries"; then
              echo "Unexpected external tweak remained in the IPA: $forbidden" >&2
              exit 1
            fi
          done

          unzip -p "$PACKAGE" "Payload/YouTube.app/YouTube" \
            > "$RUNNER_TEMP/final-YouTube"
          python3 - "$RUNNER_TEMP/final-YouTube" <<'PY'
          import pathlib
          import sys

          binary = pathlib.Path(sys.argv[1]).read_bytes()
          original = bytes.fromhex(
              "28 66 8c 52 c8 2e ac 72 1f 00 08 6b 61 00 00 54 "
              "28 00 80 52"
          )
          patched = bytes.fromhex(
              "c0 03 5f d6 "
              "20 00 80 52 c0 03 5f d6 "
              "1f 00 08 6b 61 00 00 54 28 00 80 52"
          )
          if original in binary:
              raise SystemExit("The original SupportsCodec function remains")
          if binary.count(patched) != 1:
              raise SystemExit(
                  "The guarded SupportsCodec patch is missing or ambiguous"
              )
          print("Validated static SupportsCodec patch")
          PY

          if ! otool -L "$RUNNER_TEMP/final-YouTube" \
              | grep -Fq "YouMod.dylib"; then
            echo "YouTube executable does not load YouMod.dylib." >&2
            exit 1
          fi
          if ! otool -L "$RUNNER_TEMP/final-YouTube" \
              | grep -Fq "VP9Compat.dylib"; then
            echo "YouTube executable does not load VP9Compat.dylib." >&2
            exit 1
          fi
          if otool -L "$RUNNER_TEMP/final-YouTube" \
              | grep -Fq "YTUHD.dylib"; then
            echo "YouTube executable unexpectedly loads YTUHD.dylib." >&2
            exit 1
          fi

          unzip -p "$PACKAGE" \
            "Payload/YouTube.app/Frameworks/VP9Compat.dylib" \
            > "$RUNNER_TEMP/VP9Compat.dylib"
          if ! strings "$RUNNER_TEMP/VP9Compat.dylib" \
              | grep -Fq "vpx_codec_dec_init_ver"; then
            echo "VP9Compat does not contain the static libvpx decoder." >&2
            exit 1
          fi
          if otool -L "$RUNNER_TEMP/VP9Compat.dylib" \
              | grep -Eiq "dav1d|libundirect"; then
            echo "VP9Compat links an excluded AV1 or external pattern library." >&2
            exit 1
          fi
          if strings "$RUNNER_TEMP/VP9Compat.dylib" \
              | grep -Eiq "HAMDav1dVideoDecoder|libundirect_find"; then
            echo "VP9Compat contains excluded AV1 or external pattern code." >&2
            exit 1
          fi
          unzip -p "$PACKAGE" "Payload/YouTube.app/Info.plist" \
            > "$RUNNER_TEMP/final-Info.plist"
          actual_bundle_id=$(
            /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" \
              "$RUNNER_TEMP/final-Info.plist"
          )
          actual_app_name=$(
            /usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" \
              "$RUNNER_TEMP/final-Info.plist"
          )
          if [[ "$actual_bundle_id" != "$EXPECTED_BUNDLE_ID" ]]; then
            echo "Unexpected bundle ID: $actual_bundle_id" >&2
            exit 1
          fi
          if [[ "$actual_app_name" != "$EXPECTED_APP_NAME" ]]; then
            echo "Unexpected app name: $actual_app_name" >&2
            exit 1
          fi

          shasum -a 256 "$PACKAGE" | tee "$PACKAGE.sha256"
          echo "Validated $PACKAGE"

      - name: Upload IPA
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: YouMod_VP9Compat_${{ steps.youtube.outputs.version }}_${{ github.run_id }}
          path: |
            ${{ steps.inject.outputs.package }}
            ${{ steps.inject.outputs.package }}.sha256
          if-no-files-found: error
          compression-level: 0
