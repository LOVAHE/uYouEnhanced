# Original idea by @ISnackable. Thanks to him for handling the hardest parts!
# https://github.com/ISnackable/YTCubePlus/blob/main/.github/workflows/Build.yml

name: Build and Release uYouEnhanced

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "17.5"
        required: true
        type: string
      uyou_version:
        description: "uYou Version"
        default: "3.0.4"
        required: true
        type: string
      decrypted_youtube_url:
        description: "Direct URL of the decrypted YouTube IPA"
        default: ""
        required: true
        type: string
      bundle_id:
        description: "Modify the bundle ID"
        default: "com.google.ios.youtube"
        required: true
        type: string
      app_name:
        description: "Modify the app name"
        default: "YouTube"
        required: true
        type: string
      commit_id:
        description: "(Optional) Commit ID to build at"
        default: ""
        required: false
        type: string
      upload_artifact:
        description: "Upload IPA as artifact"
        default: false
        required: false
        type: boolean
      create_release:
        description: "Create a draft release"
        default: true
        required: false
        type: boolean
      diagnostic_mode:
        description: "Build startup-isolation artifacts (base, uYou only, no uYou, full)"
        default: false
        required: false
        type: boolean
      diagnostic_set:
        description: "Diagnostic profile set"
        default: "standard"
        required: false
        type: choice
        options:
          - standard
          - split
          - sources
  
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build uYouEnhanced (${{ matrix.profile }})
    runs-on: macos-15
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJSON(inputs.diagnostic_mode && (inputs.diagnostic_set == 'sources' && '["source-shell", "source-main", "source-patches", "source-settings", "source-visuals"]' || inputs.diagnostic_set == 'split' && '["enhanced-core", "extras-a", "extras-b"]' || '["base", "uyou-only", "no-uyou", "full"]') || '["full"]') }}

    steps:
      - name: Checkout Main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          path: main
          ref: ${{ github.event.inputs.commit_id || github.ref }}
          submodules: recursive

      - name: Install Dependencies
        run: brew install ldid dpkg make meson ninja

      - name: Set PATH environment variable
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH 

      - name: Setup Theos
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: theos/theos
          ref: 9bc73406cf80b711ef4d02c15ff1dedc4478a275
          path: theos
          submodules: recursive
      
      - name: SDK Caching
        id: SDK
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        env:
          cache-name: iOS-${{ inputs.sdk_version }}-SDK
        with:
          path: theos/sdks/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Download iOS SDK
        if: steps.SDK.outputs.cache-hit != 'true'
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/aricloverEXTRA/sdks.git
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS${{ inputs.sdk_version }}.sdk
          git checkout
          mv *.sdk $THEOS/sdks
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Setup Theos Jailed
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: qnblackcat/theos-jailed
          ref: 662fd704aed27b8956bcfe52a35e2b676921ab42
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        run: |
          ./theos-jailed/install
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Mask YouTube IPA URL
        run: |
          URL_YT="$(jq -r '.inputs.decrypted_youtube_url' $GITHUB_EVENT_PATH)"
          echo "::add-mask::$URL_YT"
          echo "URL_YT=$URL_YT" >> "$GITHUB_ENV"

      - name: Prepare YouTube iPA
        id: prepare_youtube
        run: |
          curl --fail --location --silent --show-error "$YOUTUBE_URL" --output main/YouTube.ipa
          cd ${{ github.workspace }}/main
          mv YouTube.ipa YouTube.zip
          unzip -q YouTube.zip

          # App Store migration extensions require entitlements that sideloaded
          # builds cannot use. Signing tools also do not consistently rewrite
          # bundle IDs for the newer YouTube.app/Extensions location, which
          # makes iOS reject the entire app after the main ID gains a suffix.
          if [[ -d Payload/YouTube.app/Extensions ]]; then
            mkdir -p excluded-app-extensions
            mv Payload/YouTube.app/Extensions excluded-app-extensions/
            echo "==> Excluded App Store-only extensions from the sideloaded IPA"
          fi

          youtube_version=$(defaults read "$(pwd)/Payload/YouTube.app/Info" CFBundleVersion)
          echo "==> YouTube v$youtube_version downloaded!"
          echo "youtube_version=${youtube_version}" >> $GITHUB_OUTPUT

        env:
          THEOS: ${{ github.workspace }}/theos
          YOUTUBE_URL: ${{ env.URL_YT }}

      - name: Build Package
        id: build_package
        run: |
          cd ${{ github.workspace }}/main
          mkdir -p packages

          if [[ "$PROFILE" == "base" ]]; then
            package="packages/YouTube_${YOUTUBE_VERSION}_diagnostic-base.ipa"
            ditto -c -k --sequesterRsrc --keepParent Payload "$package"
          else
            make package \
              THEOS_PACKAGE_SCHEME=rootless \
              IPA=Payload/YouTube.app \
              FINALPACKAGE=1 \
              TARGET="iphone:clang:${SDK_VERSION}:14.0" \
              DISPLAY_NAME="$APP_NAME" \
              BUNDLE_ID="$BUNDLE_ID" \
              YOUTUBE_VERSION="$YOUTUBE_VERSION" \
              UYOU_VERSION="$UYOU_VERSION" \
              DIAGNOSTIC_PROFILE="$PROFILE"

            shopt -s nullglob
            ipa_files=(packages/*.ipa)
            if (( ${#ipa_files[@]} != 1 )); then
              echo "Expected exactly one IPA, found ${#ipa_files[@]}" >&2
              exit 1
            fi
            built_package="${ipa_files[0]}"
            if [[ "$DIAGNOSTIC_MODE" == "true" ]]; then
              package="packages/uYouEnhanced_${YOUTUBE_VERSION}-${UYOU_VERSION}_diagnostic-${PROFILE}.ipa"
            else
              package="packages/uYouEnhanced_${YOUTUBE_VERSION}-${UYOU_VERSION}.ipa"
            fi
            mv "$built_package" "$package"
          fi

          unzip -tq "$package"

          unexpected_extensions="$({
            unzip -Z1 "$package" || true
          } | awk '/\.appex\/Info\.plist$/ && $0 !~ /^Payload\/YouTube\.app\/PlugIns\// { print }')"
          if [[ -n "$unexpected_extensions" ]]; then
            echo "Unsupported app extensions remained outside PlugIns:" >&2
            echo "$unexpected_extensions" >&2
            exit 1
          fi

          required_files=()
          forbidden_files=()
          case "$PROFILE" in
            base)
              forbidden_files=(uYouEnhanced.dylib uYou.dylib uYouCompat.dylib)
              ;;
            uyou-only)
              required_files=(uYouEnhanced.dylib uYou.dylib uYouCompat.dylib)
              forbidden_files=(libFLEX.dylib iSponsorBlock.dylib YTUHD.dylib YTweaks.dylib)
              ;;
            enhanced-core)
              required_files=(uYouEnhanced.dylib uYou.dylib uYouCompat.dylib libcolorpicker.dylib)
              forbidden_files=(
                libFLEX.dylib iSponsorBlock.dylib YTABConfig.dylib YTIcons.dylib
                YouGroupSettings.dylib YouLoop.dylib YouMute.dylib YouPiP.dylib
                YouQuality.dylib YouSlider.dylib YouSpeed.dylib YouTimeStamp.dylib
                YouTubeDislikesReturn.dylib DontEatMyContent.dylib
                YTHoldForSpeed.dylib YTUHD.dylib YTVideoOverlay.dylib YTweaks.dylib
              )
              ;;
            source-shell|source-main|source-patches|source-settings|source-visuals)
              required_files=(uYouEnhanced.dylib uYouCompat.dylib libcolorpicker.dylib)
              forbidden_files=(
                uYou.dylib libFLEX.dylib iSponsorBlock.dylib YTABConfig.dylib
                YTIcons.dylib YouGroupSettings.dylib YouLoop.dylib YouMute.dylib
                YouPiP.dylib YouQuality.dylib YouSlider.dylib YouSpeed.dylib
                YouTimeStamp.dylib YouTubeDislikesReturn.dylib
                DontEatMyContent.dylib YTHoldForSpeed.dylib YTUHD.dylib
                YTVideoOverlay.dylib YTweaks.dylib
              )
              ;;
            extras-a)
              required_files=(
                uYouEnhanced.dylib uYou.dylib uYouCompat.dylib libcolorpicker.dylib
                libFLEX.dylib iSponsorBlock.dylib YTABConfig.dylib YTIcons.dylib
                YouTubeDislikesReturn.dylib DontEatMyContent.dylib
                YTHoldForSpeed.dylib YTVideoOverlay.dylib YTweaks.dylib
              )
              forbidden_files=(
                YouGroupSettings.dylib YouLoop.dylib YouMute.dylib YouPiP.dylib
                YouQuality.dylib YouSlider.dylib YouSpeed.dylib
                YouTimeStamp.dylib YTUHD.dylib
              )
              ;;
            extras-b)
              required_files=(
                uYouEnhanced.dylib uYou.dylib uYouCompat.dylib libcolorpicker.dylib
                YouGroupSettings.dylib YouLoop.dylib YouMute.dylib YouPiP.dylib
                YouQuality.dylib YouSlider.dylib YouSpeed.dylib
                YouTimeStamp.dylib YTUHD.dylib
              )
              forbidden_files=(
                libFLEX.dylib iSponsorBlock.dylib YTABConfig.dylib YTIcons.dylib
                YouTubeDislikesReturn.dylib DontEatMyContent.dylib
                YTHoldForSpeed.dylib YTVideoOverlay.dylib YTweaks.dylib
              )
              ;;
            no-uyou)
              required_files=(
                uYouEnhanced.dylib uYouCompat.dylib libFLEX.dylib iSponsorBlock.dylib
                YTABConfig.dylib YTIcons.dylib YouGroupSettings.dylib YouLoop.dylib
                YouMute.dylib YouPiP.dylib YouQuality.dylib YouSlider.dylib
                YouSpeed.dylib YouTimeStamp.dylib YouTubeDislikesReturn.dylib
                DontEatMyContent.dylib YTHoldForSpeed.dylib YTUHD.dylib
                YTVideoOverlay.dylib YTweaks.dylib libcolorpicker.dylib
              )
              forbidden_files=(uYou.dylib)
              ;;
            full)
              required_files=(
                uYouEnhanced.dylib uYou.dylib uYouCompat.dylib libFLEX.dylib iSponsorBlock.dylib
                YTABConfig.dylib YTIcons.dylib YouGroupSettings.dylib YouLoop.dylib
                YouMute.dylib YouPiP.dylib YouQuality.dylib YouSlider.dylib
                YouSpeed.dylib YouTimeStamp.dylib YouTubeDislikesReturn.dylib
                DontEatMyContent.dylib YTHoldForSpeed.dylib YTUHD.dylib
                YTVideoOverlay.dylib YTweaks.dylib libcolorpicker.dylib
              )
              ;;
          esac
          for file in "${required_files[@]}"; do
            unzip -Z1 "$package" "Payload/YouTube.app/Frameworks/$file" >/dev/null || {
              echo "Missing Frameworks/$file in IPA" >&2
              exit 1
            }
          done
          for file in "${forbidden_files[@]}"; do
            if unzip -Z1 "$package" "Payload/YouTube.app/Frameworks/$file" >/dev/null 2>&1; then
              echo "Unexpected Frameworks/$file in $PROFILE IPA" >&2
              exit 1
            fi
          done

          if [[ "$PROFILE" != "base" ]]; then
            parent_dylib="$RUNNER_TEMP/uYouEnhanced-${PROFILE}.dylib"
            unzip -p "$package" "Payload/YouTube.app/Frameworks/uYouEnhanced.dylib" > "$parent_dylib"
            if ! otool -L "$parent_dylib" | grep -q 'uYouCompat\.dylib'; then
              echo "uYouEnhanced.dylib is not linked to uYouCompat.dylib; constructor ordering is unsafe" >&2
              exit 1
            fi
          fi

          required_entries=()
          if [[ "$PROFILE" == "uyou-only" ]]; then
            required_entries=(Frameworks/CydiaSubstrate.framework/CydiaSubstrate)
          elif [[ "$PROFILE" == "no-uyou" || "$PROFILE" == "enhanced-core" ||
                  "$PROFILE" == "extras-a" || "$PROFILE" == "extras-b" ||
                  "$PROFILE" == source-* ||
                  "$PROFILE" == "full" ]]; then
            required_entries=(
              Frameworks/Alderis.framework/Alderis
              Frameworks/CydiaSubstrate.framework/CydiaSubstrate
              PlugIns/OpenYoutubeSafariExtension.appex/OpenYoutube
              PlugIns/ShareServiceExtension.appex/Youtube
            )
          fi
          for entry in "${required_entries[@]}"; do
            unzip -Z1 "$package" "Payload/YouTube.app/$entry" >/dev/null || {
              echo "Missing $entry in IPA" >&2
              exit 1
            }
          done

          required_directories=()
          if [[ "$PROFILE" == "uyou-only" ]]; then
            required_directories=(uYouBundle.bundle)
          elif [[ "$PROFILE" == "no-uyou" ]]; then
            required_directories=(
              DontEatMyContent.bundle RYD.bundle YTABC.bundle YTHoldForSpeed.bundle
              YTUHD.bundle YTVideoOverlay.bundle YTWKS.bundle YouGroupSettings.bundle
              YouLoop.bundle YouMute.bundle YouPiP.bundle YouQuality.bundle
              YouSlider.bundle YouSpeed.bundle YouTimeStamp.bundle iSponsorBlock.bundle
              uYouLocalization.bundle uYouPlus.bundle
            )
          elif [[ "$PROFILE" == "enhanced-core" || "$PROFILE" == "extras-a" ||
                  "$PROFILE" == "extras-b" || "$PROFILE" == source-* ||
                  "$PROFILE" == "full" ]]; then
            required_directories=(
              DontEatMyContent.bundle RYD.bundle YTABC.bundle YTHoldForSpeed.bundle
              YTUHD.bundle YTVideoOverlay.bundle YTWKS.bundle YouGroupSettings.bundle
              YouLoop.bundle YouMute.bundle YouPiP.bundle YouQuality.bundle
              YouSlider.bundle YouSpeed.bundle YouTimeStamp.bundle iSponsorBlock.bundle
              uYouBundle.bundle uYouLocalization.bundle uYouPlus.bundle
            )
          fi
          for directory in "${required_directories[@]}"; do
            unzip -Z1 "$package" "Payload/YouTube.app/$directory/*" | grep -q . || {
              echo "Missing $directory in IPA" >&2
              exit 1
            }
          done

          package_name="$(basename "$package")"
          echo "package=$package_name" >> "$GITHUB_OUTPUT"
          echo -e "==> \033[1mSHASUM256: $(shasum -a 256 "$package" | cut -f1 -d' ')\033[0m"
          echo -e "==> \033[1mBundle ID: ${{ env.BUNDLE_ID }}\033[0m"

        env:
          THEOS: ${{ github.workspace }}/theos
          SDK_VERSION: ${{ inputs.sdk_version }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
          UYOU_VERSION: ${{ inputs.uyou_version }}
          BUNDLE_ID: ${{ inputs.bundle_id }}
          APP_NAME: ${{ inputs.app_name }}
          PROFILE: ${{ matrix.profile }}
          DIAGNOSTIC_MODE: ${{ inputs.diagnostic_mode }}

      - name: Upload Artifact
        if: ${{ inputs.upload_artifact || inputs.diagnostic_mode }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        env:
          UYOU_VERSION: ${{ inputs.uyou_version }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
        with:
          name: uYouEnhanced_v${{ env.YOUTUBE_VERSION }}-${{ env.UYOU_VERSION }}_${{ matrix.profile }}
          path: ${{ github.workspace }}/main/packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error

      - name: Create Diagnostic Release
        if: ${{ inputs.diagnostic_mode }}
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UYOU_VERSION: ${{ inputs.uyou_version }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
        with:
          tag_name: diagnostic-${{ github.run_id }}-${{ matrix.profile }}
          name: Diagnostic ${{ matrix.profile }} - YouTube v${{ env.YOUTUBE_VERSION }}
          body: Temporary startup-isolation build. Do not use as a production release.
          files: main/packages/${{ steps.build_package.outputs.package }}
          draft: true
          overwrite_files: true

      - name: Create Release
        if: ${{ inputs.create_release && !inputs.diagnostic_mode && matrix.profile == 'full' }}
        id: create_release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UYOU_VERSION: ${{ inputs.uyou_version }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
        with:
          tag_name: v${{ env.YOUTUBE_VERSION }}-${{ env.UYOU_VERSION }}
          name: uYouEnhanced v${{ env.YOUTUBE_VERSION }}-${{ env.UYOU_VERSION }}
          body: Built for YouTube v${{ env.YOUTUBE_VERSION }} with uYou v${{ env.UYOU_VERSION }}.
          files: main/packages/*.ipa
          draft: true
          overwrite_files: true
