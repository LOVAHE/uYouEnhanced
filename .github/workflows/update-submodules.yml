name: Update Submodules

on:
  workflow_dispatch:

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    concurrency:
      group: update-submodules-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Update fast-forward submodules
        shell: bash
        run: |
          set -euo pipefail

          # Deliberately excluded:
          # - Return-YouTube-Dislikes and YouTubeHeader have diverged histories.
          # - protobuf is intentionally pinned.
          # - YouTube-X has no gitlink in the parent repository.
          safe_submodules=(
            Extensions
            Tweaks/Alderis
            Tweaks/DontEatMyContent
            Tweaks/FLEXing
            Tweaks/IAmYouTube
            Tweaks/NoYTPremium
            Tweaks/PSHeader
            Tweaks/RemoteLog
            Tweaks/YouGroupSettings
            Tweaks/YouLoop
            Tweaks/YouMute
            Tweaks/YouPiP
            Tweaks/YouQuality
            Tweaks/YouSlider
            Tweaks/YouSpeed
            Tweaks/YouTimeStamp
            Tweaks/YTABConfig
            Tweaks/YTClassicVideoQuality
            Tweaks/YTHoldForSpeed
            Tweaks/YTIcons
            Tweaks/YTUHD
            Tweaks/YTVideoOverlay
            Tweaks/iSponsorBlock
            Tweaks/uYouLocalization
            Tweaks/libundirect
            Tweaks/YTweaks
          )

          git submodule sync

          for submodule in "${safe_submodules[@]}"; do
            current=$(git ls-tree HEAD -- "$submodule" | awk '{print $3}')
            if [[ -z "$current" ]]; then
              echo "::error::$submodule has no gitlink in HEAD"
              exit 1
            fi

            git submodule update --init "$submodule"
            git submodule update --remote "$submodule"
            updated=$(git -C "$submodule" rev-parse HEAD)

            if [[ "$current" != "$updated" ]] && ! git -C "$submodule" merge-base --is-ancestor "$current" "$updated"; then
              echo "::error::$submodule is not a fast-forward update ($current -> $updated)"
              exit 1
            fi

            git -C "$submodule" submodule update --init --recursive
            git add "$submodule"
          done

          if git diff --cached --quiet; then
            echo "All selected submodules are already up to date."
            exit 0
          fi

          git diff --cached --submodule=short
          git commit -m "Update fast-forward submodules"
          git push origin "HEAD:${GITHUB_REF_NAME}"
